# 秋招提前批监控配置（基于 Spider_XHS 采集小红书）
# 关键词不宜太多，每个关键词都会发一次搜索请求，过多会增加封号风险。
# 已精简到 3 个最核心的（降低请求量、降低软封概率）。
keywords:
  - 秋招提前批
  - 2027届提前批
  - 提前批 内推码

# 命中公司名会加分
companies:
  - 腾讯
  - 阿里
  - 字节
  - 美团
  - 快手
  - 百度
  - 京东
  - 网易
  - 小米
  - 华为
  - 拼多多
  - 滴滴
  - 携程
  - 蔚来
  - 大疆

# 命中这些词会加分（强信号：已开/网申/链接）
hot_words:
  - 已开启
  - 正式启动
  - 提前批开启
  - 网申开启
  - 网申
  - 投递
  - 投递链接
  - 内推码
  - 内推
  - 截止
  - 开奖
  - 研发
  - 算法
  - 后端
  - 前端
  - 产品经理

search:
  require_num: 10        # 每词只取 10 条（page_size=20，等于只翻 1 页 = 每词 1 个请求）
  sort_type_choice: 1    # 0 综合, 1 最新, 2 最多点赞, 3 最多评论, 4 最多收藏
  note_time: 2           # 0 不限, 1 一天内, 2 一周内, 3 半年内
  note_type: 0           # 0 不限, 1 视频, 2 图文
  min_score: 4           # 低于该分数的命中不计入
  detail_threshold: 7    # 分数 >= 该值时，--detail 模式才去拉笔记正文确认
  # 请求间隔：在 [sleep_min, sleep_max] 之间随机取值（抖动更大，更像真人，降低软封）
  sleep_min: 5.0
  sleep_max: 12.0
  max_detail: 3          # --detail 模式每次最多拉多少条正文（封顶，进一步减少请求）

# 可选代理，降低封号风险，例如 http://127.0.0.1:7890；留空则不用
proxy: ""
